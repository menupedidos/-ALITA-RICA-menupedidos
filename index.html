<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alita Rica - Sabor de Barrio</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#121212;
color:#fff;
}
header{
background:#c40000;
padding:20px;
text-align:center;
}
h1{margin:0;}
section{
padding:20px;
border-bottom:1px solid #333;
}
h2{
color:#ff9800;
margin-top:0;
}
select,input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:none;
}
button{
background:#ff9800;
color:#000;
border:none;
padding:14px;
font-weight:bold;
cursor:pointer;
border-radius:6px;
width:100%;
font-size:16px;
}
.sabores{
columns:2;
}
.oculto{display:none;}
footer{
text-align:center;
padding:15px;
background:#000;
}
</style>
</head>
<body>

<header>
<h1>🔥 ALITA RICA 🔥</h1>
<p>Sabor de Barrio al Carbón</p>
</header>

<section>
<h2>👤 Datos del Cliente</h2>

<label>Nombre *</label>
<input type="text" id="nombre">

<label>Tipo de pedido *</label>
<select id="tipoPedido" onchange="mostrarDireccion()">
<option value="">Selecciona</option>
<option value="Pickup">Pickup</option>
<option value="Delivery">Delivery</option>
</select>

<div id="direccionBox" class="oculto">
<label>Dirección *</label>
<input type="text" id="direccion">
<label>Referencia *</label>
<input type="text" id="referencia">
</div>

<label>Forma de pago *</label>
<select id="pago">
<option value="">Selecciona</option>
<option value="Efectivo">Efectivo</option>
<option value="Transferencia">Transferencia</option>
</select>

</section>

<section>
<h2>🍔 Hamburguesas</h2>
<select id="burgers">
<option value="">Ninguna</option>
<option>Clásica $109</option>
<option>Doble Bacón $129</option>
<option>Champiburger $145</option>
<option>Hawaianburger $145</option>
<option>Cachitoburger $165</option>
<option>Promo Smash 3 $99</option>
</select>
</section>

<section>
<h2>🌭 Jochos</h2>
<select id="jochos">
<option value="">Ninguno</option>
<option>Jocho clásico $35</option>
<option>Jocho hawaiano $45</option>
<option>Jocho champi $45</option>
<option>Cachitojocho $60</option>
<option>PromoJocho 2 $60</option>
</select>
</section>

<section>
<h2>🍗 Alitas</h2>
<select id="alitas">
<option value="">Ninguna</option>
<option>10 pzas $139</option>
<option>18 pzas $229</option>
<option>28 pzas $329</option>
<option>Combo Fan $99</option>
<option>Combo Mix $139</option>
</select>
</section>

<section>
<h2>🍗 Boneless</h2>
<select id="boneless">
<option value="">Ninguno</option>
<option>10 pzas $139</option>
<option>18 pzas $239</option>
<option>28 pzas $339</option>
</select>
</section>

<section>
<h2>🌶 Sabores (Máx 3 si eliges alitas o boneless)</h2>
<div class="sabores">
<label><input type="checkbox" value="Takis Blu">Takis Blu</label><br>
<label><input type="checkbox" value="BBQ">BBQ</label><br>
<label><input type="checkbox" value="Chetos Bolita">Chetos Bolita</label><br>
<label><input type="checkbox" value="Ruffles Queso">Ruffles Queso</label><br>
<label><input type="checkbox" value="Chetos Flamin">Chetos Flamin</label><br>
<label><input type="checkbox" value="Mango Habanero">Mango Habanero</label><br>
<label><input type="checkbox" value="Skwinkles">Skwinkles</label><br>
<label><input type="checkbox" value="Sauce Black Tajín Valentina">Sauce Black Tajín</label><br>
<label><input type="checkbox" value="Doritos Incógnita">Doritos Incógnita</label><br>
<label><input type="checkbox" value="Lemon Pepper">Lemon Pepper</label><br>
<label><input type="checkbox" value="Búfalo">Búfalo</label><br>
<label><input type="checkbox" value="Pulparindo">Pulparindo</label>
</div>
</section>

<section>
<h2>🥤 Refrescos</h2>
<select id="refrescos">
<option value="">Ninguno</option>
<option>Refresco 355ml $15-$16</option>
<option>Boing 245ml $20</option>
<option>Refresco 600ml $27</option>
</select>
</section>

<section>
<button onclick="enviarPedido()">Enviar Pedido</button>
</section>

<footer>
© 2026 Alita Rica
</footer>

<script>
function mostrarDireccion(){
let tipo = document.getElementById("tipoPedido").value;
let box = document.getElementById("direccionBox");
if(tipo==="Delivery"){box.classList.remove("oculto");}
else{box.classList.add("oculto");}
}

function enviarPedido(){
let nombre=document.getElementById("nombre").value;
let tipo=document.getElementById("tipoPedido").value;
let direccion=document.getElementById("direccion").value;
let referencia=document.getElementById("referencia").value;
let pago=document.getElementById("pago").value;
let burger=document.getElementById("burgers").value;
let jocho=document.getElementById("jochos").value;
let alitas=document.getElementById("alitas").value;
let boneless=document.getElementById("boneless").value;
let refresco=document.getElementById("refrescos").value;

if(nombre===""){alert("Nombre obligatorio");return;}
if(tipo===""){alert("Selecciona Pickup o Delivery");return;}
if(tipo==="Delivery"&&(direccion===""||referencia==="")){
alert("Dirección y referencia obligatorias");return;}
if(pago===""){alert("Selecciona forma de pago");return;}

let sabores=[];
document.querySelectorAll('input[type=checkbox]:checked').forEach((item)=>{
sabores.push(item.value);
});

if((alitas!==""||boneless!=="") && sabores.length>3){
alert("Máximo 3 sabores");return;}

let mensaje="Hola quiero hacer un pedido:%0A";
mensaje+="Nombre: "+nombre+"%0A";
mensaje+="Tipo: "+tipo+"%0A";
if(tipo==="Delivery"){
mensaje+="Dirección: "+direccion+"%0A";
mensaje+="Referencia: "+referencia+"%0A";
}
mensaje+="Pago: "+pago+"%0A";
if(burger!=="") mensaje+="Burger: "+burger+"%0A";
if(jocho!=="") mensaje+="Jocho: "+jocho+"%0A";
if(alitas!=="") mensaje+="Alitas: "+alitas+"%0A";
if(boneless!=="") mensaje+="Boneless: "+boneless+"%0A";
if(refresco!=="") mensaje+="Refresco: "+refresco+"%0A";
if(sabores.length>0) mensaje+="Sabores: "+sabores.join(", ")+"%0A";

let numero="5219903667103"; // CAMBIA POR TU NUMERO
window.open("https://wa.me/"+numero+"?text="+mensaje,"_blank");
}
</script>

</body>
</html>
