<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALITA RICA - Menú Digital</title>

<style>
body{
font-family: Arial, sans-serif;
background:#111;
color:#fff;
margin:0;
padding:15px;
}

h1{text-align:center;color:#ff3c00;}
h2{color:#ff9900;margin-top:25px;}

.section{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
}

input, select, textarea{
padding:8px;
border-radius:6px;
border:none;
margin-top:5px;
width:100%;
}

input[type="number"]{
width:60px;
text-align:center;
}

.flex{
display:flex;
gap:10px;
margin-top:8px;
}

button{
width:100%;
padding:15px;
background:#ff3c00;
color:#fff;
font-size:18px;
border:none;
border-radius:10px;
margin-top:15px;
}

.total{
text-align:center;
font-size:20px;
color:#00ff99;
margin-top:15px;
}
</style>
</head>

<body>

<h1>🔥 ALITA RICA 🔥</h1>

<div id="menu"></div>

<div class="section">
<h2>📦 Tipo de Pedido</h2>
<select id="tipoPedido" onchange="toggleDireccion()">
<option value="">Selecciona una opción</option>
<option value="Recoger en local">Recoger en local</option>
<option value="Delivery">Delivery</option>
</select>
</div>

<div class="section" id="direccionBox" style="display:none;">
<h2>🚚 Dirección</h2>
<textarea id="direccion" placeholder="Escribe tu dirección completa"></textarea>
</div>

<div class="section">
<h2>💳 Forma de Pago</h2>
<select id="pago">
<option value="">Selecciona método de pago</option>
<option>Efectivo</option>
<option>Transferencia</option>
</select>
</div>

<div class="total">Total: $<span id="total">0</span></div>

<button onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>

<script>
const telefono = "5219903667103";

const sabores = [
"Takis Blu","BBQ","Chetos Bolita","Ruffles Queso",
"Chetos Flamin","Mango Habanero","Skwinkles",
"Sauce Black Tajín Valentina","Doritos Incógnita",
"Lemon Pepper","Búfalo","Pulparindo"
];

const menu = [
{categoria:"🍔 Hamburguesas", items:[
{nombre:"Burger clásica c/ papas", precio:109},
{nombre:"Doble bacón c/ papas", precio:129},
{nombre:"Champiburger c/ papas", precio:145},
{nombre:"Hawaianburger c/ papas", precio:145},
{nombre:"Cachitoburger c/ papas", precio:145},
{nombre:"Promo smash sencillas 3", precio:99}
]},
{categoria:"🌭 Jochos", items:[
{nombre:"Jocho clásico c/ papas", precio:35},
{nombre:"Jocho hawaiano c/ papas", precio:45},
{nombre:"Jocho champi c/ papas", precio:45},
{nombre:"Cachitojocho c/ papas", precio:60},
{nombre:"PromoJocho sencillo 2", precio:60}
]},
{categoria:"🥤 Bebidas", items:[
{nombre:"Refresco 355ml", precio:15},
{nombre:"BOING 245ml", precio:20},
{nombre:"Refresco 600ml", precio:27}
]}
];

const contenedor=document.getElementById("menu");

menu.forEach((sec,s)=>{
let div=document.createElement("div");
div.className="section";
let html=`<h2>${sec.categoria}</h2>`;

sec.items.forEach((item,i)=>{
let id=s+"-"+i;
html+=`
<div class="item">
<span>${item.nombre} - $${item.precio}</span>
<input type="number" min="0" value="0"
data-nombre="${item.nombre}"
data-precio="${item.precio}">
</div>
`;
});

div.innerHTML=html;
contenedor.appendChild(div);
});

/* ===== ALITAS ===== */

crearEspecial("🍗 Alitas","Alitas");
crearEspecial("🍗 Boneless","Boneless");

function crearEspecial(titulo,tipo){

let div=document.createElement("div");
div.className="section";

div.innerHTML=`
<h2>${titulo}</h2>

<select id="${tipo}Cantidad" onchange="calcularTotal()">
<option value="">Selecciona cantidad</option>
<option value="10-139">10 piezas - $139</option>
<option value="18-229">18 piezas - $229</option>
<option value="28-329">28 piezas - $329</option>
</select>

<div class="flex">
<select id="${tipo}Sabor1">${sabores.map(s=>`<option>${s}</option>`)}</select>
<input type="number" placeholder="Piezas">
</div>

<div class="flex">
<select id="${tipo}Sabor2">${sabores.map(s=>`<option>${s}</option>`)}</select>
<input type="number" placeholder="Piezas">
</div>

<div class="flex">
<select id="${tipo}Sabor3">${sabores.map(s=>`<option>${s}</option>`)}</select>
<input type="number" placeholder="Piezas">
</div>
`;

contenedor.appendChild(div);
}

document.addEventListener("input",calcularTotal);

function calcularTotal(){
let total=0;

document.querySelectorAll("input[data-precio]").forEach(input=>{
let cant=parseInt(input.value)||0;
let precio=parseInt(input.dataset.precio);
total+=cant*precio;
});

["Alitas","Boneless"].forEach(tipo=>{
let select=document.getElementById(tipo+"Cantidad");
if(select.value){
let precio=parseInt(select.value.split("-")[1]);
total+=precio;
}
});

document.getElementById("total").innerText=total;
}

function toggleDireccion(){
let tipo=document.getElementById("tipoPedido").value;
document.getElementById("direccionBox").style.display=
tipo==="Delivery"?"block":"none";
}

function enviarPedido(){

let tipoPedido=document.getElementById("tipoPedido").value;
let direccion=document.getElementById("direccion").value.trim();
let pago=document.getElementById("pago").value;

if(!tipoPedido){alert("Selecciona tipo de pedido");return;}
if(tipoPedido==="Delivery" && !direccion){alert("Ingresa dirección");return;}
if(!pago){alert("Selecciona forma de pago");return;}

let mensaje="🔥 *ALITA RICA* 🔥%0A%0A";
let total=0;

document.querySelectorAll("input[data-precio]").forEach(input=>{
let cant=parseInt(input.value)||0;
if(cant>0){
let nombre=input.dataset.nombre;
let precio=parseInt(input.dataset.precio);
total+=cant*precio;
mensaje+=`🛒 ${nombre} x${cant} = $${cant*precio}%0A`;
}
});

["Alitas","Boneless"].forEach(tipo=>{
let select=document.getElementById(tipo+"Cantidad");
if(select.value){
let piezas=select.value.split("-")[0];
let precio=parseInt(select.value.split("-")[1]);
total+=precio;
mensaje+=`🛒 ${tipo} ${piezas} piezas = $${precio}%0A`;
}
});

mensaje+=`%0A💰 Total: $${total}%0A`;
mensaje+=`📦 Tipo: ${tipoPedido}%0A`;
if(tipoPedido==="Delivery") mensaje+=`📍 ${direccion}%0A`;
mensaje+=`💳 Pago: ${pago}`;

window.open(`https://wa.me/${telefono}?text=${mensaje}`,"_blank");
}
</script>

</body>
</html>
