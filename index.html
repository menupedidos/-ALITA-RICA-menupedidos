<script>

const telefono = "5219903667103";

const sabores = [
"Takis Blu","BBQ","Chetos Bolita","Ruffles Queso",
"Chetos Flamin","Mango Habanero","Skwinkles",
"Sauce Black Tajín Valentina","Doritos Incógnita",
"Lemon Pepper","Búfalo","Pulparindo"
];

/* =========================
   AGREGAR CAMPO NOMBRE
========================= */

const nombreBox = document.createElement("div");
nombreBox.className = "section";
nombreBox.innerHTML = `
<h2>👤 Nombre del Cliente</h2>
<input type="text" id="nombreCliente" placeholder="Escribe tu nombre">
`;

document.body.insertBefore(nombreBox, document.body.firstChild.nextSibling);


/* =========================
   TOTAL
========================= */

document.addEventListener("input",calcularTotal);

function calcularTotal(){
let total=0;

document.querySelectorAll("input[data-precio]").forEach(input=>{
let cant=parseInt(input.value)||0;
let precio=parseInt(input.dataset.precio);
total+=cant*precio;
});

["Alitas","Boneless"].forEach(tipo=>{
let select=document.getElementById(tipo+"Cantidad");
if(select && select.value){
let precio=parseInt(select.value.split("-")[1]);
total+=precio;
}
});

document.getElementById("total").innerText=total;
}


/* =========================
   DELIVERY
========================= */

function toggleDireccion(){
let tipo=document.getElementById("tipoPedido").value;
document.getElementById("direccionBox").style.display=
tipo==="Delivery"?"block":"none";
}


/* =========================
   ENVIAR PEDIDO
========================= */

function enviarPedido(){

let nombre=document.getElementById("nombreCliente").value.trim();
let tipoPedido=document.getElementById("tipoPedido").value;
let direccion=document.getElementById("direccion").value.trim();
let pago=document.getElementById("pago").value;

if(!nombre){alert("Escribe tu nombre");return;}
if(!tipoPedido){alert("Selecciona tipo de pedido");return;}
if(tipoPedido==="Delivery" && !direccion){alert("Ingresa dirección");return;}
if(!pago){alert("Selecciona forma de pago");return;}

let mensaje="🔥 *ALITA RICA* 🔥%0A%0A";
mensaje+=`👤 Cliente: ${nombre}%0A%0A`;

let total=0;

/* Productos normales */

document.querySelectorAll("input[data-precio]").forEach(input=>{
let cant=parseInt(input.value)||0;
if(cant>0){
let nombreProd=input.dataset.nombre;
let precio=parseInt(input.dataset.precio);
total+=cant*precio;
mensaje+=`🛒 ${nombreProd} x${cant} = $${cant*precio}%0A`;
}
});

/* Alitas y Boneless con sabores */

["Alitas","Boneless"].forEach(tipo=>{
let select=document.getElementById(tipo+"Cantidad");

if(select && select.value){

let piezasTotales=select.value.split("-")[0];
let precio=parseInt(select.value.split("-")[1]);
total+=precio;

mensaje+=`🛒 ${tipo} ${piezasTotales} piezas = $${precio}%0A`;

for(let i=1;i<=3;i++){
let sabor=document.getElementById(tipo+"Sabor"+i);
let piezasInput=sabor.nextElementSibling;

let piezas=parseInt(piezasInput.value)||0;

if(piezas>0){
mensaje+=`   🌶 ${sabor.value}: ${piezas} piezas%0A`;
}
}
}
});

mensaje+=`%0A💰 Total: $${total}%0A`;
mensaje+=`📦 Tipo: ${tipoPedido}%0A`;

if(tipoPedido==="Delivery"){
mensaje+=`📍 ${direccion}%0A`;
}

mensaje+=`💳 Pago: ${pago}`;

window.open(`https://wa.me/${telefono}?text=${mensaje}`,"_blank");
}

</script>
