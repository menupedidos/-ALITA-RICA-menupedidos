<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALITA RICA - Pedido Online</title>

<style>
body{
font-family: Arial, sans-serif;
background:#121212;
color:white;
margin:0;
padding:0;
}

.container{
max-width:650px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#ffcc00;
}

h2{
margin-top:30px;
border-bottom:1px solid #333;
padding-bottom:5px;
}

input, select{
width:100%;
padding:10px;
margin:6px 0 15px 0;
border-radius:8px;
border:none;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#ffcc00;
color:black;
font-weight:bold;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ffaa00;
}

.checkbox-group{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.checkbox-group label{
background:#1e1e1e;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.total-box{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-top:20px;
font-size:18px;
text-align:center;
}
</style>
</head>

<body>
<div class="container">

<h1>🍔 ALITA RICA 🔥</h1>

<h2>Datos del Cliente</h2>
<input type="text" id="nombre" placeholder="Nombre del cliente" required>

<select id="tipoEntrega" onchange="mostrarDireccion()">
<option value="">Tipo de entrega</option>
<option value="Pickup">Pickup</option>
<option value="Delivery">Delivery</option>
</select>

<div id="direccionBox" style="display:none;">
<input type="text" id="direccion" placeholder="Dirección exacta con referencia">
</div>

<h2>Hamburguesas</h2>
<label>Clásica $109</label><input type="number" id="clasica" min="0" value="0" onchange="calcularTotal()">
<label>Doble bacón $129</label><input type="number" id="bacon" min="0" value="0" onchange="calcularTotal()">
<label>Champiburger $145</label><input type="number" id="champi" min="0" value="0" onchange="calcularTotal()">
<label>Hawaianburger $145</label><input type="number" id="hawaiana" min="0" value="0" onchange="calcularTotal()">
<label>Cachitoburger $165</label><input type="number" id="cachito" min="0" value="0" onchange="calcularTotal()">

<h2>Promo Smash $99</h2>
<input type="number" id="smash" min="0" value="0" onchange="calcularTotal()">

<h2>Wings</h2>
<select id="wingsCantidad" onchange="calcularTotal()">
<option value="0">Selecciona cantidad</option>
<option value="139">10 pzas $139</option>
<option value="229">18 pzas $229</option>
<option value="329">28 pzas $329</option>
</select>

<p>Hasta 3 sabores:</p>
<div class="checkbox-group">
<label><input type="checkbox" name="saborWings" value="BBQ"> BBQ</label>
<label><input type="checkbox" name="saborWings" value="Buffalo"> Buffalo</label>
<label><input type="checkbox" name="saborWings" value="Mango Habanero"> Mango Habanero</label>
<label><input type="checkbox" name="saborWings" value="Lemon Pepper"> Lemon Pepper</label>
<label><input type="checkbox" name="saborWings" value="Chipotle"> Chipotle</label>
</div>

<h2>Boneless</h2>
<select id="bonelessCantidad" onchange="calcularTotal()">
<option value="0">Selecciona cantidad</option>
<option value="139">10 pzas $139</option>
<option value="239">18 pzas $239</option>
<option value="339">28 pzas $339</option>
</select>

<p>Hasta 3 sabores:</p>
<div class="checkbox-group">
<label><input type="checkbox" name="saborBoneless" value="BBQ"> BBQ</label>
<label><input type="checkbox" name="saborBoneless" value="Buffalo"> Buffalo</label>
<label><input type="checkbox" name="saborBoneless" value="Mango Habanero"> Mango Habanero</label>
<label><input type="checkbox" name="saborBoneless" value="Lemon Pepper"> Lemon Pepper</label>
<label><input type="checkbox" name="saborBoneless" value="Chipotle"> Chipotle</label>
</div>

<h2>Jochos</h2>
<label>Jocho clásico $35</label><input type="number" id="jochoClasico" min="0" value="0" onchange="calcularTotal()">
<label>Jocho hawaiano $45</label><input type="number" id="jochoHawaiano" min="0" value="0" onchange="calcularTotal()">
<label>Jocho champi $45</label><input type="number" id="jochoChampi" min="0" value="0" onchange="calcularTotal()">
<label>Cachitojocho $60</label><input type="number" id="cachitoJocho" min="0" value="0" onchange="calcularTotal()">

<h2>PromoJocho 2x$60</h2>
<input type="number" id="promoJocho" min="0" value="0" onchange="calcularTotal()">

<h2>Método de Pago</h2>
<select id="pago">
<option value="">Selecciona forma de pago</option>
<option value="Efectivo">Efectivo</option>
<option value="Transferencia">Transferencia</option>
</select>

<div class="total-box">
Total: $<span id="total">0</span>
</div>

<br>
<button onclick="enviarPedido()">Enviar Pedido por WhatsApp</button>

</div>

<script>

function mostrarDireccion(){
const tipo = document.getElementById("tipoEntrega").value;
document.getElementById("direccionBox").style.display = tipo === "Delivery" ? "block" : "none";
}

function limitarSabores(nombre){
const seleccionados = document.querySelectorAll(`input[name="${nombre}"]:checked`);
if(seleccionados.length > 3){
seleccionados[seleccionados.length-1].checked = false;
alert("Solo puedes elegir hasta 3 sabores");
}
}

document.querySelectorAll('input[name="saborWings"]').forEach(el=>{
el.addEventListener('change',()=>limitarSabores("saborWings"));
});

document.querySelectorAll('input[name="saborBoneless"]').forEach(el=>{
el.addEventListener('change',()=>limitarSabores("saborBoneless"));
});

function calcularTotal(){
let total = 0;

total += document.getElementById("clasica").value * 109;
total += document.getElementById("bacon").value * 129;
total += document.getElementById("champi").value * 145;
total += document.getElementById("hawaiana").value * 145;
total += document.getElementById("cachito").value * 165;
total += document.getElementById("smash").value * 99;
total += document.getElementById("jochoClasico").value * 35;
total += document.getElementById("jochoHawaiano").value * 45;
total += document.getElementById("jochoChampi").value * 45;
total += document.getElementById("cachitoJocho").value * 60;
total += document.getElementById("promoJocho").value * 60;
total += parseInt(document.getElementById("wingsCantidad").value);
total += parseInt(document.getElementById("bonelessCantidad").value);

document.getElementById("total").innerText = total;
}

function enviarPedido(){

const telefono = "5219903667103";

let nombre = document.getElementById("nombre").value;
let tipo = document.getElementById("tipoEntrega").value;
let direccion = document.getElementById("direccion").value;
let pago = document.getElementById("pago").value;
let total = document.getElementById("total").innerText;

if(nombre === "" || tipo === "" || pago === ""){
alert("Completa todos los campos obligatorios");
return;
}

if(tipo === "Delivery" && direccion === ""){
alert("Ingresa dirección para Delivery");
return;
}

let mensaje = `🍔 *PEDIDO ALITA RICA* 🍔%0A%0A`;
mensaje += `👤 ${nombre}%0A🚚 ${tipo}%0A`;

if(tipo === "Delivery"){
mensaje += `📍 ${direccion}%0A`;
}

mensaje += `%0A💰 TOTAL: $${total}%0A`;
mensaje += `%0A💳 Pago: ${pago}`;

window.open(`https://wa.me/${telefono}?text=${mensaje}`);
}

</script>

</body>
</html>
